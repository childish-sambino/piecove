name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: allowlist behavior tests
        run: node --experimental-strip-types --test tests/allowlist.test.ts
      - name: extension import smoke test
        run: |
          node --experimental-strip-types --eval '
            await import("./internal/runtime/assets/extensions/pi-costlab.ts");
            await import("./internal/runtime/assets/extensions/pi-notify.ts");
            console.log("extensions import cleanly");
          '

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax
        run: |
          for f in internal/runtime/assets/entrypoint.sh \
                   internal/runtime/assets/serve.sh \
                   internal/runtime/assets/shims/browser-open.sh \
                   internal/runtime/assets/shims/say-forward.sh \
                   internal/runtime/assets/bench/run.sh; do
            bash -n "$f"
          done
      - name: shellcheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y shellcheck
          shellcheck -S warning internal/runtime/assets/entrypoint.sh internal/runtime/assets/serve.sh
